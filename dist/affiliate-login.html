<html lang="en">

    <meta charset="utf-8">

    <meta name="robots" content="noindex,nofollow">
    <link rel="icon" type="image/png" href="/assets/zavora-logo.png">
    <link rel="stylesheet" href="/affiliate.css">

  </head>
  <body class="affiliate-auth-page">
    <main class="affiliate-auth">
      <a class="affiliate-auth-logo" href="/affiliate"><img src="/assets/zavora-logo.png" alt="">ZAVORA AFFILIATES</a>
      <section class="affiliate-auth-card">
        <p class="affiliate-eyebrow">Partner Login</p>
        <h1>Access your affiliate dashboard.</h1>
        <p>Only approved affiliates can sign in. This login is separate from customer accounts.</p>
        <form data-affiliate-login>
          <input name="email" type="email" placeholder="Affiliate email" required>
          <input name="password" type="password" placeholder="Affiliate password" required>
          <button class="affiliate-primary" type="submit">Login</button>
          <button class="affiliate-text-button" type="button" data-affiliate-forgot-open>Forgot password?</button>
          <p class="affiliate-message" data-affiliate-message></p>
        </form>
        <form class="affiliate-forgot-panel" data-affiliate-forgot hidden>
          <p class="affiliate-eyebrow">Password Reset</p>
          <h2>Reset affiliate password.</h2>
          <input name="email" type="email" placeholder="Affiliate email" required>
          <button class="affiliate-secondary dark" type="button" data-affiliate-forgot-send>Send OTP</button>
          <input name="otp" type="text" inputmode="numeric" maxlength="6" placeholder="6-digit OTP" autocomplete="one-time-code">
          <input name="password" type="password" minlength="6" placeholder="New password">
          <button class="affiliate-primary" type="submit">Create New Password</button>
          <p class="affiliate-message" data-affiliate-forgot-message></p>
        </form>
      </section>
    </main>
    <script src="/affiliate.js" defer></script>
  </body>
</html>
