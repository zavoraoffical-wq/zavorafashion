<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <meta name="robots" content="noindex,nofollow">
    <title>Admin Login | Zavora Fashion</title>
    <link rel="icon" type="image/png" href="assets/zavora-logo.png">
    <link rel="stylesheet" href="admin.css">
  </head>
  <body class="admin-login-body">
    <main class="admin-login-page">
      <section class="admin-login-card">
        <p class="admin-eyebrow">Hidden admin access</p>
        <img class="admin-login-logo" src="assets/zavora-logo.png" alt="Zavora Fashion">
        <h1>Zavora Admin</h1>
        <p>Secure login is protected by password and one-time email OTP from Zavora Support.</p>
        <form class="admin-form" data-admin-login-form>
          <input type="email" placeholder="Admin email" autocomplete="email" value="kitchenwala1@gmail.com" required>
          <input type="password" placeholder="Admin password" autocomplete="current-password" required>
          <button class="primary-admin" type="submit">Send OTP</button>
          <p class="admin-login-note" data-admin-login-note>OTP will be sent to the admin email only.</p>
        </form>
      </section>
    </main>
    <script src="admin-login.js" defer></script>
  </body>
</html>
